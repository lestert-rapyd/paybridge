<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout cancelled · PayBridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Epilogue:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      font-family: 'Epilogue', system-ui, sans-serif;
      background: #f2ede4; color: #17140f; padding: 24px;
    }
    .card {
      background: #fff; border: 1px solid #e4ddd1; border-radius: 18px;
      box-shadow: 0 18px 50px rgba(23,20,15,.10);
      padding: 46px 42px; max-width: 440px; width: 100%; text-align: center;
    }
    .badge {
      width: 66px; height: 66px; border-radius: 50%; display: grid; place-items: center;
      font-size: 30px; color: #fff; margin: 0 auto 18px;
      background: linear-gradient(135deg, #98938a, #6d675c);
    }
    h1 { font-family: 'Anton', sans-serif; font-weight: 400; font-size: 30px; letter-spacing: .02em; }
    p { font-size: 14px; color: #6d675c; line-height: 1.55; margin-top: 12px; }
    a.btn {
      display: inline-block; margin-top: 26px; padding: 14px 28px; border-radius: 10px;
      background: linear-gradient(135deg, #5600ef, #a855f7); color: #fff;
      font-family: 'Anton', sans-serif; font-size: 15px; letter-spacing: .04em; text-decoration: none;
    }
    .brand { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 26px; }
    .brand-mark {
      width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center;
      background: linear-gradient(135deg, #5600ef, #a855f7); color: #fff; font-size: 11px;
    }
    .brand-word { font-family: 'Anton', sans-serif; font-size: 18px; letter-spacing: .04em; }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand"><span class="brand-mark">◆</span><span class="brand-word">PayBridge</span></div>
    <div class="badge">✕</div>
    <h1>Checkout cancelled</h1>
    <p>No charge was made. You can close this tab and start a new payment from the demo whenever you're ready.</p>
    <a class="btn" href="https://rapydtoolkit.com/">Back to the demo</a>
  </main>
</body>
</html>
