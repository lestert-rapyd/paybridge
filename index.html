<!DOCTYPE html>
<html lang="en" data-vertical="ecommerce">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PayBridge · API Sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Epilogue:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="app">

    <!-- ── Header ── -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">◆</span>
        <span class="brand-word">PayBridge</span>
        <span class="brand-sub">API Sandbox · Live Payment Demo</span>
      </div>

      <div class="vertical-pills" id="vertical-pills"><!-- rendered by app.js --></div>

      <div class="topbar-right">
        <div class="env-switch" id="env-switch">
          <button data-env="sandbox" class="active">Sandbox</button>
          <button data-env="live">Live</button>
        </div>
      </div>
    </header>

    <!-- ── Model sub-bar ── -->
    <div class="subbar">
      <div class="model-switch" id="model-switch">
        <button class="model-btn active" data-model="own-fields">
          <span class="mb-tag">PCI-DSS</span> Own Card Fields
        </button>
        <button class="model-btn" data-model="toolkit">
          <span class="mb-tag">Hosted</span> Checkout Toolkit
        </button>
      </div>
      <div class="model-desc" id="model-desc"></div>
    </div>

    <!-- ── Split ── -->
    <main class="split">

      <!-- LEFT: client site / back office + demo controls -->
      <section class="pane pane-left">
        <div class="left-tabs" id="left-tabs">
          <button class="left-tab active" data-view="client">Client Site</button>
          <button class="left-tab" data-view="backoffice">Client Back Office</button>
        </div>

        <div class="browser">
          <div class="browser-chrome">
            <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
            <div class="urlbar"><span class="lock">🔒</span><span id="client-domain">shop.paybridge.com</span></div>
            <span class="chrome-tag">Client site</span>
          </div>
          <div class="browser-body">
            <div class="checkout" id="checkout"><!-- rendered by app.js --></div>
          </div>
        </div>
        <div class="offstage" id="offstage" hidden><!-- out-of-window annotations (e.g. bank-app view) --></div>
        <div class="demo-controls" id="demo-controls" hidden><!-- flow-specific SE controls --></div>

        <div class="backoffice" id="backoffice" hidden><!-- rendered by flows/back-office.js --></div>
      </section>

      <!-- RIGHT: engine room -->
      <section class="pane pane-right">
        <div class="rtabs">
          <button class="rtab active" data-tab="request">Request</button>
          <button class="rtab" data-tab="response">Response</button>
          <button class="rtab" data-tab="webhooks">Webhooks</button>
          <button class="rtab" data-tab="console" id="rtab-console">Console</button>
          <div class="status-ind idle" id="status-ind">
            <span class="si-dot"></span><span class="si-text">Awaiting input</span>
          </div>
        </div>
        <div class="rpanels">
          <div class="rpanel active" data-panel="request" id="panel-request"></div>
          <div class="rpanel" data-panel="response" id="panel-response"></div>
          <div class="rpanel" data-panel="webhooks" id="panel-webhooks"></div>
          <div class="rpanel" data-panel="console" id="panel-console"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- Portal: escapes .browser's overflow:hidden, same reasoning as #offstage
       but for a floating popover rather than an out-of-window annotation. -->
  <div class="fx-popover" id="fx-popover" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
